grpc:
  name: "interaction"
  address: ":31002"
  logger:
    path: "./log"
    file: "{Y-m-d}.log"
    prefix: "interaction-service"
    level: "all"
    stdout: true
    rotateSize: 104857600
    rotateBackupLimit: 7
    ctxKeys: [ "traceId" ]
    timeFormat: "2006-01-02 15:04:05.000"

database:
  default:
    link: "mysql:root:zK8!pW#s&t@5g$E7hN*d@tcp(mysql:3306)/interaction"
    debug: false

etcd:
  address: "etcd:2379"
