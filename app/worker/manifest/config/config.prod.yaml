server:
  address: ":8599"
  openapiPath: "/api.json"
  swaggerPath: "/swagger"
  logger:
    path: "./log"
    file: "{Y-m-d}.log"
    prefix: "worker-service"
    level: "all"
    stdout: true
    rotateSize: 104857600
    rotateBackupLimit: 7
    ctxKeys: [ "traceId" ]
    timeFormat: "2006-01-02 15:04:05.000"

rabbitmq:
  default:
    address: "amqp://root:zK8!pW#s&t@5g$E7hN*d@tcp"
    exchange:
      orderDelayExchange: "order.delay.exchange"
    queue:
      orderTimeoutQueue: "order.timeout.queue"
