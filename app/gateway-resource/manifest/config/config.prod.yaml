server:
  address: ":8399"
  openapiPath: "/api.json"
  swaggerPath: "/swagger"
  logger:
    path: "./log"
    file: "{Y-m-d}.log"
    prefix: "gateway-resource"
    level: "all"
    stdout: true
    rotateSize: 104857600
    rotateBackupLimit: 7
    ctxKeys: [ "traceId" ]
    timeFormat: "2006-01-02 15:04:05.000"

database:
  default:
    link: "mysql:root:zK8!pW#s&t@5g$E7hN*d@tcp(mysql:3306)/resource"
    debug: false

etcd:
  address: "etcd:2379"

qiniu:
  accessKey: "${QINIU_ACCESS_KEY}"
  secretKey: "${QINIU_SECRET_KEY}"
  bucket: "your-bucket-name"  # 请替换为您的七牛云存储桶名称
  domain: "http://your-domain.com" # 请替换为您的七牛云访问域名
