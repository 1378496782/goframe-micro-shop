apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: goods-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: goods-service
  minReplicas: 2  # 最小Pod数量
  maxReplicas: 10  # 最大Pod数量
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60  # CPU利用率超过60%时触发扩容
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70  # 内存使用率超过70%时触发扩容
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60  # 扩容稳定窗口，避免频繁扩容
      policies:
        - type: Percent
          value: 100  # 每次最多扩容100%
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300  # 缩容稳定窗口，设置更长时间避免抖动
      policies:
        - type: Percent
          value: 50  # 每次最多缩容50%
          periodSeconds: 300