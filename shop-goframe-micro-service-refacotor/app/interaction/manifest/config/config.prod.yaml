grpc:
  name: "interaction"
  address: ":31002"
  logger:
    path: "./log"
    file: "{Y-m-d}.log"
    prefix: "interaction-service"
    level: "all"
    stdout: true
    rotateSize: 104857600
    rotateBackupLimit: 7
    ctxKeys: [ "traceId" ]
    timeFormat: "2006-01-02 15:04:05.000"

database:
  default:
    link: "mysql:root:CHANGE_ME_MYSQL_ROOT_PASSWORD@tcp(mysql:3306)/interaction"
    debug: false

etcd:
  address: "etcd:2379"

redis:
  default:
    address: "redis:6379"
    db: 3
    pass: ""
    idleTimeout: "600s"
    maxActive: 50
    idle: 10
    connectTimeout: "5s"
